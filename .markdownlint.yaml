# markdownlint configuration
# See https://github.com/DavidAnson/markdownlint/blob/main/doc/Rules.md

# MD013/line-length - Allow longer lines (MkDocs admonitions, tables, links need room)
MD013:
  line_length: 160
  heading_line_length: 120
  code_block_line_length: 160
  tables: false
  headings: false

# MD043/required-headings - Disable; MkDocs pages have their own H1 headings
MD043: false

# MD046/code-block-style - Allow fenced code blocks (required by MkDocs Material)
MD046:
  style: fenced
